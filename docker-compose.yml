services:
  mysql:
    image: mysql:8.4
    container_name: leadforge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: leadforge_root
      MYSQL_DATABASE: leadforge
      MYSQL_USER: leadforge
      MYSQL_PASSWORD: leadforge
    ports:
      - "3307:3306"
    volumes:
      - leadforge_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uleadforge", "-pleadforge"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - leadforge

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadforge-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: Website scrapper
      APP_ENV: production
      DEBUG: "false"
      API_V1_PREFIX: /api/v1
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: leadforge
      DB_PASSWORD: leadforge
      DB_NAME: leadforge
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
      SCRAPER_HEADLESS: "true"
      SCRAPER_MAX_RESULTS: "120"
      SCRAPER_SCROLL_PAUSE_MS: "1500"
      SCRAPER_REQUEST_DELAY_MS: "500"
      SCRAPER_SCROLL_STABLE_ROUNDS: "5"
      BULK_TARGET_DEFAULT: "10000"
      BULK_DELAY_BETWEEN_SEARCHES_SECONDS: "3"
      WEBSITE_DETECTION_TIMEOUT_SECONDS: "8"
      WEBSITE_DETECTION_CONCURRENCY: "10"
    ports:
      - "8000:8000"
    shm_size: "2gb"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - leadforge

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leadforge-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - leadforge

networks:
  leadforge:
    driver: bridge

volumes:
  leadforge_mysql_data:
